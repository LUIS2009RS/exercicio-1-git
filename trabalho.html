<!DOCTYPE html>
<html>
<head>
  <title>Exemplo JS</title>
</head>
<body>

<h1>Teste de Função</h1>

<button onclick="somar()">Clique para somar</button>

<p id="resultado"></p>

<script>
function somar() {
  let a = 20;
  let b = 8;
  let resultado = a + b;

  document.getElementById("resultado").innerText = "Resultado: " + resultado;
}
</script>

</body>
</html>
